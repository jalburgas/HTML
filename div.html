<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta y Layout Alineado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /*Hace que el width y height que le asignes a un elemento incluyan el padding y el border dentro de ese tamaño.*/
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
        }

        /* Contenedor principal */
        .main-container {
            width: 900px;
            margin: 0 auto;
        }

        /* Tarjeta */
        .tarjeta {
            width: 380px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }

        .tarjeta h2 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333333;
            font-size: 24px;
        }

        .tarjeta p {
            margin-bottom: 20px;
            color: #666666;
            line-height: 1.5;
        }

        /* Div interno */
        .tbody {
            background-color: #f5f5f5;
            padding: 15px;
            border: 1px solid #dddddd;
            border-radius: 8px;
            margin-top: 10px;
        }

        .tbody p {
            margin-bottom: 0;
            color: #555555;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- Tarjeta -->
        <div class="tarjeta">
            <h2>Título</h2>
            <p>Este texto está dentro del div principal de la tarjeta.</p>
            <div class="tbody">
                <p>Este es otro div interno (tbody).</p>
            </div>
        </div>


</body>

</html>
