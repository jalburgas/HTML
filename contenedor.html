<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contenedor con Columnas</title>
    <style>
        /* Contenedor de columnas */
        .contenedor {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        /* Columna izquierda */
        .columna-izquierda {
            width: 30%;
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            color: white;
        }

        /* Columna derecha */
        .columna-derecha {
            width: 70%;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #dddddd;
            color: #333333;
            line-height: 1.5;
        }

        .columna-derecha strong {
            color: #2c3e50;
        }
    </style>
</head>

<body>
    <!-- Layout de columnas -->
    <div class="contenedor">
        <div class="columna-izquierda">
            Menu lateral
        </div>
        <div class="columna-derecha">
            <strong>Contenido principal</strong>
            <br><br>
            Este es el area de contenido principal, perfectamente alineado con el menu lateral.
            Las columnas estan distribuidas en 30% y 70% respectivamente.
        </div>
    </div>
    </div>

</html>
