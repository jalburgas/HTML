<html> <!--etiqueta raíz del documento HTML -->

<head>
    <!--es un contenedor para metadatos (información sobre el documento HTML) que no se muestra directamente en la página web. Se coloca dentro de la etiqueta  -->
    <title>Mi Web</title>
</head>

<body> <!--es el contenedor de todo el contenido visible de una página web.   -->
    <h1>Bienvenido a mi Web</h1>
    <!-- h1representa el encabezado de nivel más alto o el título principal de una página o sección. Es parte de los encabezados HTML-->
    <p>Esta es una simple página web.</p>
    <!--p representa un párrafo de texto. Es una etiqueta de bloque que se utiliza para agrupar y organizar el contenido textual en una página web.-->
</body>

</html>
